name: builderv2

on:
  workflow_dispatch:
    inputs:
      BUILD_TITLE:
        description: 'Custom Build Title'
        required: false
      KERNEL_TREE:
        description: 'Kernel Tree'
        default: 'https://github.com/harunaltair/build_kernel_peridot'
        required: true
      KERNEL_TREE_BRANCH:
        description: 'Kernel Tree Branch'
        required: true
        default: 'main'
      CODENAME:
        description: 'Phone Codename'
        default: 'peridot'
        required: true
      USE_KSU:
        description: 'Enable KernelSU?'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Generate Build Date
      id: build_date
      run: echo "build_date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Prepare environment
      run: |
        sudo apt update -y
        sudo apt install -y \
          flex bison libncurses-dev libssl-dev bc build-essential git \
          ccache binutils-aarch64-linux-gnu curl wget zip python3 \
          libelf-dev pahole lz4 zstd

        mkdir -p $HOME/tc/clang
        cd $HOME/tc
        echo "Downloading ZyC-Clang 22.0.0git-20250928..."
        wget -q https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz \
             -O clang.tar.gz
        tar -xf clang.tar.gz -C clang

    - name: Clone kernel source
      run: |
        git clone --depth=1 ${{ github.event.inputs.KERNEL_TREE }} \
          -b ${{ github.event.inputs.KERNEL_TREE_BRANCH }} kernel
        echo "KERNEL_DIR=$(pwd)/kernel" >> $GITHUB_ENV

    - name: Bump SUBLEVEL to 166 (Google 6.1.166 LTS)
      run: |
        cd $KERNEL_DIR
        sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 166/' Makefile
        echo "Kernel version after bump:"
        head -5 Makefile

    - name: Apply ADIOS I/O Scheduler (firelzrd)
      run: |
        cd $KERNEL_DIR
        git clone --depth=1 https://github.com/firelzrd/adios /tmp/adios-src
        find /tmp/adios-src -maxdepth 2 -name "*.c" -exec cp {} block/ \;
        find /tmp/adios-src -maxdepth 2 -name "*.h" -exec cp {} block/ \;
        echo "ADIOS files copied:"
        ls block/*adios* 2>/dev/null || echo "Tidak ada file adios di block/"

    - name: Apply TCP Brutal
      run: |
        cd $KERNEL_DIR
        git clone --depth=1 https://github.com/apernet/tcp-brutal /tmp/tcp-brutal-src
        cp /tmp/tcp-brutal-src/kernel/brutal.c net/ipv4/ 2>/dev/null && echo "brutal.c copied" || echo "brutal.c tidak ditemukan"
        cp /tmp/tcp-brutal-src/kernel/brutal.h include/net/ 2>/dev/null && echo "brutal.h copied" || echo "brutal.h tidak ditemukan"

    - name: Apply defconfig extras (BBR, WireGuard, TCP Fast Open)
      run: |
        cd $KERNEL_DIR
        cat >> arch/arm64/configs/peridot_defconfig << 'EOF'
CONFIG_TCP_CONG_BBR=y
CONFIG_DEFAULT_TCP_CONG="bbr"
CONFIG_WIREGUARD=y
CONFIG_WIREGUARD_DEBUG=n
CONFIG_IP_NF_TARGET_TTL=y
CONFIG_IPV6_NF_TARGET_HL=y
EOF
        echo "defconfig extras applied"

    - name: Build kernel
      run: |
        cd $KERNEL_DIR

        export PATH="$HOME/tc/clang/bin:$PATH"
        export LD_LIBRARY_PATH="$HOME/tc/clang/lib64:$LD_LIBRARY_PATH"

        DATE=$(date '+%Y%m%d-%H%M')
        OUT_DIR=out
        VERSION="SweetKernel-Peridot-${DATE}"
        JOBS=$(nproc --all)

        ARGS="ARCH=arm64 \
          O=${OUT_DIR} \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
          -j${JOBS}"

        if [ "${{ github.event.inputs.USE_KSU }}" = "true" ]; then
          echo "Integrating KernelSU..."
          curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -
          echo "CONFIG_KSU=y" >> arch/arm64/configs/peridot_defconfig
        fi

        make ${ARGS} peridot_defconfig
        make ${ARGS}

        if [ -f "out/arch/arm64/boot/Image.gz" ]; then
          git clone --depth=1 https://github.com/harunaltair/ak3 ak3
          cp out/arch/arm64/boot/Image.gz ak3/

          printf '%s\n' \
            "SweetKernel for Peridot - ${DATE}" \
            "==================================" \
            "- Google 6.1.166 LTS base" \
            "- ZyC-Clang 22.0.0git-20250928" \
            "- BBR congestion control" \
            "- WireGuard built-in" \
            "- TCP Brutal" \
            "- ADIOS I/O Scheduler (firelzrd)" \
            "- TCP Fast Open" \
            "- charging_enabled node" \
            "- fastcharge support" \
            "- Skip blacklisted modules gracefully" \
            "- Force loading modules (symbol version check bypass)" \
            "- Fix const qualifier in resolve_full_path()" \
            "- Guard MIN() macro with ifndef" \
            > ak3/changelog.txt

          cd ak3
          zip -r9 "../${VERSION}.zip" * -x '*.git*' README.md *placeholder > /dev/null
          cd ..

          echo "ZIP_NAME=${VERSION}.zip" >> $GITHUB_ENV
          echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
        else
          echo "::error::Build failed - Image.gz not found"
          echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
          exit 1
        fi

    - name: Upload Artifact
      if: env.BUILD_SUCCESS == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ github.event.inputs.CODENAME }}-${{ steps.build_date.outputs.build_date }}
        path: ${{ env.KERNEL_DIR }}/${{ env.ZIP_NAME }}
        retention-days: 7
